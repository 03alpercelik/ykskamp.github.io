<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>YKS Kamp Takip Pro - Cihazlar Arası Senkron</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #2d3436;
            --secondary-text: #636e72;
            --table-border: #dfe6e9;
            --header-bg: linear-gradient(135deg, #6c5ce7, #a29bfe);
            --row-even: #f1f2f6;
            --row-odd: #ffffff;
            --highlight: #fdcb6e;
            --accent: #00b894;
            --edit-color: #0984e3;
            --danger-color: #ff7675;
            --stat-bg: #e0f2f1;
            --past-day-bg: #e2e8f0;
            --dropdown-hover: #f1f2f6;
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --secondary-text: #94a3b8;
            --table-border: #334155;
            --header-bg: linear-gradient(135deg, #4f46e5, #818cf8);
            --row-even: #1e293b;
            --row-odd: #0f172a;
            --highlight: #eab308;
            --accent: #10b981;
            --edit-color: #3b82f6;
            --danger-color: #ef4444;
            --stat-bg: #064e3b;
            --past-day-bg: #162032;
            --dropdown-hover: #334155;
        }

        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color); transition: background 0.3s ease, color 0.3s ease; }

        .sticky-header { position: sticky; top: 0; z-index: 100; background-color: var(--bg-color); padding: 15px 20px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); backdrop-filter: blur(8px); border-bottom: 1px solid var(--table-border); }

        .controls { max-width: 1300px; margin: 0 auto 15px auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .controls-left, .controls-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

        .btn { padding: 8px 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
        .btn:active { transform: scale(0.95); }
        .btn-theme { background: #636e72; color: white; }
        .btn-edit { background: var(--edit-color); color: white; }
        .btn-edit.active { background: var(--accent); animation: pulse 2s infinite; }
        
        .dropdown { position: relative; display: inline-block; }
        .dropdown-content {
            display: none; position: absolute; right: 0; top: 110%;
            background-color: var(--card-bg); min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            border-radius: 8px; z-index: 1000;
            border: 1px solid var(--table-border); overflow: hidden;
        }
        .dropdown-content .drop-item {
            width: 100%; text-align: left; border-radius: 0; border: none;
            padding: 12px 16px; background: transparent; color: var(--text-color);
            font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.2s;
            display: flex; align-items: center; gap: 8px;
        }
        .dropdown-content .drop-item:hover { background-color: var(--dropdown-hover); }
        .dropdown-content .danger-item { color: var(--danger-color); }
        .show-dropdown { display: block; }
        
        .row-controls { display: flex; gap: 10px; width: 100%; max-width: 1300px; margin-top: 15px; }
        .btn-add-row { background: var(--accent); color: white; flex: 1; justify-content: center; padding: 12px; font-size: 14px; }
        .btn-del-row { background: var(--danger-color); color: white; flex: 1; justify-content: center; padding: 12px; font-size: 14px; }

        .setting-container { display: flex; align-items: center; gap: 8px; background: var(--card-bg); padding: 6px 12px; border-radius: 8px; border: 1px solid var(--table-border); font-size: 13px; font-weight: 600; }
        .setting-container input { border: none; background: transparent; color: var(--text-color); font-family: inherit; font-weight: bold; outline: none; cursor: pointer; }
        .setting-container input[disabled] { opacity: 0.9; cursor: not-allowed; }

        .connection-status { font-size: 11px; font-weight: bold; padding: 6px 10px; border-radius: 20px; display: flex; align-items: center; gap: 5px; }
        .status-online { background: rgba(0, 184, 148, 0.15); color: var(--accent); }
        .status-offline { background: rgba(255, 118, 117, 0.15); color: var(--danger-color); }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 184, 148, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(0, 184, 148, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 184, 148, 0); } }

        .progress-wrapper { max-width: 1300px; margin: 0 auto; }
        .progress-header { display: flex; justify-content: space-between; font-size: 14px; font-weight: 600; margin-bottom: 8px; align-items: center; flex-wrap: wrap; gap:10px; }
        .progress-bar-container { width: 100%; height: 10px; background-color: var(--table-border); border-radius: 20px; overflow: hidden; margin-bottom: 10px; }
        .progress-bar-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }

        .stats-container { display: flex; flex-wrap: wrap; gap: 8px; font-size: 12px; font-weight: 600; align-items: center; }
        .stat-badge { background: var(--card-bg); border: 1px solid var(--table-border); padding: 5px 10px; border-radius: 6px; display: flex; gap: 6px; align-items: center; }
        .stat-badge span { color: var(--accent); }
        .stat-hours { background: var(--stat-bg); border-color: transparent; }
        .streak-badge { background: linear-gradient(45deg, #ff9f43, #ee5253); color: white; border: none; }
        .countdown-badge { background: #222f3e; color: #ff9f43; border: none; letter-spacing: 0.5px; }

        .content { padding: 25px 20px; display: flex; flex-direction: column; align-items: center; }
        .table-container { width: 100%; max-width: 1300px; background-color: var(--card-bg); border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); overflow-x: auto; border: 1px solid var(--table-border); margin-bottom: 20px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 1100px; color: var(--text-color); }
        th, td { border-bottom: 1px solid var(--table-border); padding: 12px; text-align: left; color: var(--text-color); vertical-align: middle; transition: background 0.3s; }
        thead th { background: var(--header-bg); color: white; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; font-size: 11px; }
        
        .time-tag { display: block; font-size: 10px; margin-top: 5px; opacity: 0.9; background: rgba(255,255,255,0.2); padding: 2px 6px; border-radius: 4px; width: fit-content; }
        tr:nth-child(even) { background-color: var(--row-even); }
        tr:nth-child(odd) { background-color: var(--row-odd); }
        
        .past-day { background-color: var(--past-day-bg) !important; opacity: 0.65; filter: grayscale(0.5); }
        .past-day:hover { opacity: 1; filter: none; }
        
        .date-wrapper { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .btn-complete-day { background: transparent; border: 1px solid var(--table-border); border-radius: 4px; cursor: pointer; font-size: 12px; padding: 3px 6px; transition: all 0.2s; color: var(--text-color); opacity: 0.5; }
        .btn-complete-day:hover { background: var(--accent); color: white; opacity: 1; border-color: var(--accent); }

        .task-label { display: flex; align-items: center; cursor: pointer; gap: 10px; color: inherit; }
        .completed-text { text-decoration: line-through; opacity: 0.7; }
        
        .note-input { width: 100%; min-width: 160px; padding: 8px; border: 1px solid var(--table-border); border-radius: 6px; background: var(--card-bg); color: var(--text-color); font-size: 12px; font-family: inherit; resize: vertical; min-height: 40px; box-sizing: border-box; transition: border-color 0.2s; }
        .note-input:focus { outline: none; border-color: var(--accent); }
        
        .search-input { min-width: auto; height: 35px; width: 200px; border-radius: 20px; padding: 0 15px; }

        .today-highlight, .today-highlight td { background-color: var(--highlight) !important; color: #000000 !important; font-weight: 700 !important; }
        .today-highlight .task-label, .today-highlight .task-text, .today-highlight .completed-text { color: #000000 !important; }
        .today-highlight .time-tag { background: rgba(0,0,0,0.15) !important; color: #111111 !important; }
        .today-highlight .note-input { border-color: #555555 !important; color: #000000 !important; background: rgba(255,255,255,0.4) !important; }
        .today-highlight .note-input::placeholder { color: #444444 !important; }
        .today-highlight .hour-badge { background: #000000 !important; color: var(--highlight) !important; }
        .today-highlight .btn-complete-day { border-color: #000; color: #000; opacity: 0.8; }

        .hour-badge { background: var(--secondary-text); color: white; padding: 5px 10px; border-radius: 20px; font-weight: bold; font-size: 12px; display: inline-block; min-width: 50px; text-align: center; transition: background 0.3s; }
        .target-met { background: var(--accent) !important; }
        .target-missed { background: var(--danger-color) !important; }

        .editable-text { transition: all 0.2s; padding: 2px 4px; border-radius: 4px; border: 1px solid transparent; }
        body.edit-mode .editable-text { border: 1px dashed var(--accent); background: rgba(0, 184, 148, 0.1); cursor: text; }
        body.edit-mode .editable-text:focus { outline: none; background: rgba(0, 184, 148, 0.2); border-style: solid; }
        body.edit-mode .task-checkbox { pointer-events: none; opacity: 0.5; }

        .dashboard { width: 100%; max-width: 1300px; display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-top: 20px; }
        .dash-card { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--table-border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .dash-card h3 { margin-top: 0; font-size: 14px; margin-bottom: 15px; border-bottom: 1px solid var(--table-border); padding-bottom: 8px; }
        .chart-container { position: relative; height: 250px; width: 100%; }
        
        .weekly-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .week-item { background: var(--bg-color); padding: 10px; border-radius: 8px; text-align: center; font-size: 12px; border: 1px solid var(--table-border); }
        .week-item .w-title { font-weight: bold; color: var(--secondary-text); margin-bottom: 4px; display: block; }
        .week-item .w-val { font-size: 16px; color: var(--accent); font-weight: bold; }

        @media (max-width: 768px) {
            table { min-width: auto; font-size: 12px; }
            th, td { padding: 10px 6px; }
            .time-tag { font-size: 9px; padding: 1px 4px; }
            .hour-badge { font-size: 10px; padding: 3px 6px; }
            thead th:nth-child(n+2) { width: 18%; }
            .note-input { font-size: 11px; padding: 6px; min-width: 100px; min-height: 35px; }
            .controls { justify-content: center; }
            .setting-container { width: 100%; justify-content: center; }
            .stats-container { justify-content: center; }
            .dashboard { grid-template-columns: 1fr; }
            .search-input { width: 100%; margin-top: 5px; }
            .btn-complete-day { padding: 8px 12px; font-size: 16px; background: var(--row-even); border: 2px solid var(--table-border); border-radius: 8px; opacity: 0.8; }
        }
    </style>
</head>
<body>

<div class="sticky-header">
    <div class="controls">
        <div class="controls-left">
            <button class="btn btn-theme" id="theme-toggle" title="Karanlık/Aydınlık Mod" aria-label="Temayı Değiştir">🌙 Mod</button>
            <button class="btn btn-edit" id="edit-btn">✏️ Düzenle</button>
            <div class="setting-container" title="Kamp Başlangıç Tarihi">🗓️ <input type="date" id="start-date-picker" aria-label="Başlangıç Tarihi"></div>
            <div class="setting-container" title="Günlük Hedef Çalışma Saati">🎯 Hedef: <input type="number" id="daily-target" value="6" min="1" max="24" style="width:35px;" aria-label="Hedef Saat">s</div>
            <input type="text" id="note-search" class="note-input search-input" placeholder="🔍 Notlarda ara..." aria-label="Arama">
        </div>
        <div class="controls-right">
            <span id="connection-status" class="connection-status status-offline">🔴 Oturum Açılıyor...</span>
            <div class="dropdown">
                <button class="btn btn-theme" id="settings-toggle" aria-haspopup="true" aria-expanded="false">⚙️ Ayarlar</button>
                <div class="dropdown-content" id="settings-menu">
                    <button class="drop-item" id="notify-btn">🔔 Bildirimleri Aç</button>
                    <button class="drop-item" id="export-btn">📥 Yedeği İndir</button>
                    <button class="drop-item" id="import-trigger-btn">📤 Yedek Yükle</button>
                    <button class="drop-item danger-item" id="reset-btn">🗑️ Tabloyu Sıfırla</button>
                </div>
            </div>
            <input type="file" id="import-file" style="display:none" accept=".json">
        </div>
    </div>
    <div class="progress-wrapper">
        <div class="progress-header">
            <span id="current-date-info">YKS Kamp Takvimi</span>
            <div style="display:flex; gap:10px; align-items:center;">
                <span class="stat-badge countdown-badge" id="yks-countdown">YKS: Hesaplanıyor...</span>
                <span id="progress-text">%0 Tamamlandı</span>
            </div>
        </div>
        <div class="progress-bar-container">
            <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
        <div class="stats-container" id="stats-panel">
            </div>
    </div>
</div>

<div class="content">
    <div class="table-container">
        <table id="schedule-table">
            <thead>
                <tr>
                    <th>Tarih</th>
                    <th><span class="editable-text" data-edit-id="th-subj-1" id="th-subj-1-text">Matematik</span> <span class="time-tag editable-text" data-edit-id="th-time-1">08:30 - 10:30</span></th>
                    <th><span class="editable-text" data-edit-id="th-subj-2" id="th-subj-2-text">Deneme</span> <span class="time-tag editable-text" data-edit-id="th-time-2">10:45 - 12:45</span></th>
                    <th><span class="editable-text" data-edit-id="th-subj-3" id="th-subj-3-text">Fizik</span> <span class="time-tag editable-text" data-edit-id="th-time-3">14:15 - 16:15</span></th>
                    <th><span class="editable-text" data-edit-id="th-subj-4" id="th-subj-4-text">Kimya</span> <span class="time-tag editable-text" data-edit-id="th-time-4">16:30 - 18:30</span></th>
                    <th><span class="editable-text" data-edit-id="th-subj-5" id="th-subj-5-text">Biyoloji</span> <span class="time-tag editable-text" data-edit-id="th-time-5">19:00 - 21:00</span></th>
                    <th>Günün Notu</th>
                    <th>Toplam Saat</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>
    </div>
    
    <div class="row-controls">
        <button class="btn btn-add-row" id="add-row-btn">➕ Yeni Gün Ekle</button>
        <button class="btn btn-del-row" id="del-row-btn">➖ Son Günü Sil</button>
    </div>

    <div class="dashboard">
        <div class="dash-card">
            <h3>📈 Ders Bazlı İlerleme Trendi</h3>
            <div class="chart-container">
                <canvas id="trendChart"></canvas>
            </div>
        </div>
        <div class="dash-card">
            <h3>📅 Haftalık Özet (Saat)</h3>
            <div class="weekly-grid" id="weekly-summary-grid">
                </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCtlXFnB8OTQ-P_QKH2fAexX8UlLTRpXcg",
        authDomain: "yks-kamp-13f68.firebaseapp.com",
        databaseURL: "https://yks-kamp-13f68-default-rtdb.firebaseio.com",
        projectId: "yks-kamp-13f68",
        storageBucket: "yks-kamp-13f68.firebasestorage.app",
        messagingSenderId: "393035225036",
        appId: "1:393035225036:web:4cb914098e044c980c6f69",
        measurementId: "G-FZH3QYK7CK"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const auth = getAuth(app);
    
    // Her cihazın bağlanacağı ortak veri yolu (Cross-device sync için)
    const SHARED_PATH = "yks_kamp_pro_shared/kamp/";
    
    let tasksRef, notesRef, customTextRef, settingsRef, userRootRef;
    const connectedRef = ref(database, '.info/connected');

    document.addEventListener("DOMContentLoaded", () => {
        const tbody = document.getElementById("table-body");
        const progressFill = document.getElementById("progress-fill");
        const progressText = document.getElementById("progress-text");
        const statsPanel = document.getElementById("stats-panel");
        const targetInput = document.getElementById("daily-target");
        
        let chartInstance = null;
        let currentTarget = 6;
        let currentStartDate = "2024-04-17";

        let cacheTasks = {};
        let cacheNotes = {};
        let cacheCustomTexts = {};

        const today = new Date();
        const days = ["Pazar", "Pazartesi", "Salı", "Çarşamba", "Perşembe", "Cuma", "Cumartesi"];
        const months = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
        const todayString = `${today.getDate()} ${months[today.getMonth()]} ${days[today.getDay()]}`;

        const settingsToggle = document.getElementById('settings-toggle');
        const settingsMenu = document.getElementById('settings-menu');
        
        settingsToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            settingsMenu.classList.toggle('show-dropdown');
        });

        window.addEventListener('click', (e) => {
            if (!e.target.matches('#settings-toggle') && settingsMenu.classList.contains('show-dropdown')) {
                settingsMenu.classList.remove('show-dropdown');
            }
        });

        const updateCountdown = () => {
            const now = new Date();
            let currentYear = now.getFullYear();
            let yksDateObj = new Date(currentYear, 5, 20, 10, 15, 0); 
            if(now.getTime() > yksDateObj.getTime()) yksDateObj = new Date(currentYear + 1, 5, 20, 10, 15, 0);
            const distance = yksDateObj.getTime() - now.getTime();
            if(distance < 0) {
                document.getElementById('yks-countdown').innerText = "YKS Tamamlandı!";
                return;
            }
            const d = Math.floor(distance / (1000 * 60 * 60 * 24));
            document.getElementById('yks-countdown').innerText = `🎯 YKS: ${d} Gün`;
        };
        updateCountdown();
        setInterval(updateCountdown, 1000 * 60 * 60);

        const debounce = (func, delay) => {
            let timeout;
            return (...args) => { clearTimeout(timeout); timeout = setTimeout(() => func(...args), delay); };
        };

        const getHoursFromText = (text) => {
            if (!text) return 0;
            const timeMatch = text.match(/(\d{1,2})[:\.](\d{2})\s*-\s*(\d{1,2})[:\.](\d{2})/);
            if (timeMatch) {
                const startMins = parseInt(timeMatch[1]) * 60 + parseInt(timeMatch[2]);
                const endMins = parseInt(timeMatch[3]) * 60 + parseInt(timeMatch[4]);
                let diff = endMins - startMins;
                if (diff < 0) diff += 24 * 60; 
                return diff / 60;
            }
            const numMatch = text.match(/[\d\.]+/);
            if (numMatch) {
                const val = parseFloat(numMatch[0]);
                if (!isNaN(val)) return val;
            }
            return 0; 
        };

        const updateDashboard = (subjNames, dailyTotals, weeklyData) => {
            const ctx = document.getElementById('trendChart').getContext('2d');
            const labels = dailyTotals.map((_, i) => `${i+1}. Gün`);
            
            const datasets = subjNames.map((name, idx) => {
                const dataPoints = dailyTotals.map(dayInfo => dayInfo.subjHours[idx] || 0);
                const colors = ['#6c5ce7', '#00cec9', '#fdcb6e', '#e17055', '#00b894'];
                return {
                    label: name, data: dataPoints,
                    borderColor: colors[idx % colors.length],
                    backgroundColor: colors[idx % colors.length] + '40',
                    borderWidth: 2, tension: 0.3, fill: false
                };
            });

            if(chartInstance) chartInstance.destroy();
            const textColor = getComputedStyle(document.body).getPropertyValue('--text-color').trim();
            Chart.defaults.color = textColor;
            chartInstance = new Chart(ctx, {
                type: 'line', data: { labels, datasets },
                options: { 
                    responsive: true, maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true, title: { display: true, text: 'Saat' } } },
                    plugins: { legend: { position: 'top' } },
                    animation: { duration: 0 }
                }
            });

            const weeklyGrid = document.getElementById('weekly-summary-grid');
            weeklyGrid.innerHTML = "";
            weeklyData.forEach((week, i) => {
                weeklyGrid.innerHTML += `<div class="week-item"><span class="w-title">${i+1}. Hafta</span><span class="w-val">${week.toFixed(1)} Saat</span></div>`;
            });
        };

        const toDateStr = (d) => {
             const year = d.getFullYear();
             const month = String(d.getMonth() + 1).padStart(2, '0');
             const day = String(d.getDate()).padStart(2, '0');
             return `${year}-${month}-${day}`;
        };

        const updateStats = () => {
            const rows = document.querySelectorAll("#table-body tr");
            let completedHours = 0, remainingHours = 0;
            let subjStats = [0, 0, 0, 0, 0];
            let subjTotals = [0, 0, 0, 0, 0];
            
            const dailyTotals = [];
            const weeklyData = [];
            let weekSum = 0;
            
            let streakData = [];

            rows.forEach((row, rowIndex) => {
                let rowTotalHours = 0;
                let dateCell = row.querySelector('.date-cell');
                let rowDate = dateCell ? new Date(dateCell.dataset.fulldate) : null;
                const rowTasks = row.querySelectorAll(".task-checkbox");
                const daySubjHours = [0,0,0,0,0];
                
                rowTasks.forEach((box, taskIndex) => {
                    const headerTimeSpan = document.querySelector(`th span[data-edit-id="th-time-${taskIndex + 1}"]`);
                    const timeStr = headerTimeSpan ? headerTimeSpan.innerText : "";
                    const hrs = getHoursFromText(timeStr);
                    subjTotals[taskIndex]++;
                    
                    if (box.checked) {
                        rowTotalHours += hrs;
                        completedHours += hrs;
                        subjStats[taskIndex]++;
                        daySubjHours[taskIndex] = hrs;
                    } else {
                        remainingHours += hrs;
                    }
                });
                
                dailyTotals.push({ total: rowTotalHours, subjHours: daySubjHours });
                weekSum += rowTotalHours;
                if((rowIndex + 1) % 7 === 0 || rowIndex === rows.length - 1) { weeklyData.push(weekSum); weekSum = 0; }

                if (rowDate) {
                    streakData.push({ date: toDateStr(rowDate), hours: rowTotalHours });
                }

                const hourDisplay = document.getElementById(`hour-${rowIndex + 1}`);
                if (hourDisplay) {
                    hourDisplay.innerText = `${Number.isInteger(rowTotalHours) ? rowTotalHours : rowTotalHours.toFixed(1)} Saat`;
                    hourDisplay.classList.remove('target-met', 'target-missed');
                    if(rowTotalHours >= currentTarget) hourDisplay.classList.add('target-met');
                    else if(rowTotalHours > 0) hourDisplay.classList.add('target-missed');
                }
            });

            // Yeni ve Gelişmiş Streak (Seri) Mantığı
            let currentStreak = 0;
            let expectedDate = new Date(); 
            let expectedStr = toDateStr(expectedDate);

            // Bugün çalışıldı mı?
            let todayData = streakData.find(d => d.date === expectedStr);
            if (todayData && todayData.hours > 0) {
                currentStreak++;
            }

            // Geriye doğru (Dün ve öncesi) tarama
            expectedDate.setDate(expectedDate.getDate() - 1);
            expectedStr = toDateStr(expectedDate);

            while(true) {
                let dayData = streakData.find(d => d.date === expectedStr);
                if (dayData && dayData.hours > 0) {
                    currentStreak++;
                    expectedDate.setDate(expectedDate.getDate() - 1);
                    expectedStr = toDateStr(expectedDate);
                } else {
                    break;
                }
            }

            const subjNames = [];
            for(let i=1; i<=5; i++) {
                const el = document.getElementById(`th-subj-${i}-text`);
                subjNames.push(el ? el.innerText.split(' ')[0] : `Ders ${i}`);
            }

            let statsHtml = `<div class="stat-badge stat-hours" title="Çalışılan / Kalan Toplam Saat">⏱️ <span>${completedHours.toFixed(1)}s</span> / <span>${remainingHours.toFixed(1)}s</span></div><div class="stat-badge streak-badge" title="Mevcut Kesintisiz Çalışma Serisi">🔥 Streak: ${currentStreak} Gün</div>`;
            for(let i=0; i<5; i++) {
                const pct = subjTotals[i] === 0 ? 0 : Math.round((subjStats[i] / subjTotals[i]) * 100);
                statsHtml += `<div class="stat-badge">${subjNames[i]}: <span>%${pct}</span></div>`;
            }
            statsPanel.innerHTML = statsHtml;
            
            updateDashboard(subjNames, dailyTotals, weeklyData);
        };

        const updateDatesInTable = () => {
            const startDateObj = new Date(currentStartDate);
            const dateCells = document.querySelectorAll(".date-cell");
            const todayZero = new Date(); todayZero.setHours(0,0,0,0);
            
            dateCells.forEach((cell, index) => {
                const rowDate = new Date(startDateObj);
                rowDate.setDate(rowDate.getDate() + index);
                rowDate.setHours(0,0,0,0);
                
                const dateText = `${rowDate.getDate()} ${months[rowDate.getMonth()]} ${days[rowDate.getDay()]}`;
                cell.innerText = dateText;
                cell.dataset.fulldate = rowDate.toISOString(); 
                
                const tr = cell.closest('tr');
                tr.classList.remove("today-highlight", "past-day");
                
                if (rowDate.getTime() === todayZero.getTime()) {
                    tr.classList.add("today-highlight");
                    if (index === 0 || !tr.hasAttribute("data-scrolled")) {
                        tr.setAttribute("data-scrolled", "true");
                        setTimeout(() => tr.scrollIntoView({ behavior: 'smooth', block: 'center' }), 500);
                    }
                } else if (rowDate < todayZero) { tr.classList.add("past-day"); }
            });
            document.getElementById("current-date-info").innerText = `Bugün: ${todayString}`;
        };

        const addRowToDOM = (rowIndex) => {
            const tr = document.createElement("tr");
            let html = `<td><div class="date-wrapper"><span class="date-cell" style="font-weight: 600;"></span><button class="btn-complete-day" title="Tüm Günü Tamamla/Temizle">✅</button></div></td>`;
            
            // Tüm yeni satırlar tamamen boş başlayacak
            const rowData = ["", "", "", "", ""];

            for (let i = 1; i < 6; i++) {
                const taskId = `task-${rowIndex * 5 + (i - 1)}`;
                const editId = `task-text-${rowIndex}-${i}`;
                html += `<td><label class="task-label"><input type="checkbox" id="${taskId}" class="task-checkbox"><span class="task-text editable-text" data-edit-id="${editId}">${rowData[i - 1]}</span></label></td>`;
            }

            const dayCounter = rowIndex + 1;
            html += `<td><textarea class="note-input" id="note-${dayCounter}" placeholder="Günlük not..."></textarea></td><td><span class="hour-badge" id="hour-${dayCounter}">0 Saat</span></td>`;
            tr.innerHTML = html;
            tbody.appendChild(tr);

            if (document.body.classList.contains("edit-mode")) tr.querySelectorAll('.editable-text').forEach(el => el.setAttribute("contenteditable", "true"));
        };

        const applyDataToUI = () => {
            let globalCheckedCount = 0;
            const rows = document.querySelectorAll("#table-body tr");
            const totalTasks = rows.length * 5;

            rows.forEach((row, rowIndex) => {
                row.querySelectorAll(".task-checkbox").forEach(box => {
                    const textSpan = box.nextElementSibling;
                    const isChecked = cacheTasks[box.id] === true;
                    box.checked = isChecked;
                    if (isChecked) { textSpan.classList.add("completed-text"); globalCheckedCount++; } 
                    else { textSpan.classList.remove("completed-text"); }
                });

                row.querySelectorAll('.editable-text').forEach((el, i) => {
                    const id = el.getAttribute('data-edit-id');
                    if (cacheCustomTexts[id] !== undefined && document.activeElement !== el) {
                        el.innerText = cacheCustomTexts[id];
                    } else if (!cacheCustomTexts[id] && document.activeElement !== el && id.startsWith('task-text')) {
                         const expectedText = ""; // Boş başlatma
                         if(el.innerText !== expectedText) el.innerText = expectedText;
                    }
                });

                row.querySelectorAll('.note-input').forEach(input => {
                    if (document.activeElement !== input) input.value = cacheNotes[input.id] || "";
                });
            });

            const percent = totalTasks === 0 ? 0 : Math.round((globalCheckedCount / totalTasks) * 100);
            progressFill.style.width = `${percent}%`;
            progressText.innerText = `%${percent} Tamamlandı`;
            updateStats();
        };

        const debouncedApplyData = debounce(applyDataToUI, 150);

        // Anonim girişi yine yapıyoruz ama veriyi cihazlara ortak olan SHARED_PATH'ten alıyoruz
        onAuthStateChanged(auth, (user) => {
            if (user) {
                initAppWithUser();
            } else {
                signInAnonymously(auth).catch(console.error);
            }
        });

        function initAppWithUser() {
            // Veri yolları artık kullanıcıya özel değil, herkes (senin tüm cihazların) ortak bir yola bağlanır
            userRootRef = ref(database, SHARED_PATH);
            tasksRef = ref(database, `${SHARED_PATH}tasks/`);
            notesRef = ref(database, `${SHARED_PATH}notes/`);
            customTextRef = ref(database, `${SHARED_PATH}customTexts/`);
            settingsRef = ref(database, `${SHARED_PATH}settings/`);

            // Bağlantı durumu
            onValue(connectedRef, (snap) => {
                const cs = document.getElementById("connection-status");
                if (snap.val() === true) { cs.innerHTML = "🟢 Bağlı"; cs.className = "connection-status status-online"; } 
                else { cs.innerHTML = "🔴 Çevrimdışı"; cs.className = "connection-status status-offline"; }
            });

            // Ayarlar ve Tablo Oluşturma
            onValue(settingsRef, (snapshot) => {
                const settings = snapshot.val() || {};
                currentStartDate = settings.startDate || "2024-04-17";
                currentTarget = settings.targetHours || 6;
                const targetCount = settings.rowCount || 28;

                document.getElementById("start-date-picker").value = currentStartDate;
                targetInput.value = currentTarget;

                const currentCount = tbody.children.length;
                if (targetCount > currentCount) { 
                    for (let i = currentCount; i < targetCount; i++) addRowToDOM(i); 
                } else if (targetCount < currentCount) { 
                    const tasksUpdate = {}; const notesUpdate = {}; const customUpdate = {};
                    for (let i = targetCount; i < currentCount; i++) {
                        for (let j = 0; j < 5; j++) tasksUpdate[`task-${i * 5 + j}`] = null;
                        notesUpdate[`note-${i + 1}`] = null;
                        for (let j = 1; j <= 5; j++) customUpdate[`task-text-${i}-${j}`] = null;
                    }
                    if (Object.keys(tasksUpdate).length) update(tasksRef, tasksUpdate).catch(console.error);
                    if (Object.keys(notesUpdate).length) update(notesRef, notesUpdate).catch(console.error);
                    if (Object.keys(customUpdate).length) update(customTextRef, customUpdate).catch(console.error);
                    
                    for (let i = currentCount; i > targetCount; i--) { if (tbody.lastChild) tbody.removeChild(tbody.lastChild); } 
                }
                updateDatesInTable(); debouncedApplyData();
            });

            // Firebase Dinleyicileri
            onValue(tasksRef, (snapshot) => { cacheTasks = snapshot.val() || {}; debouncedApplyData(); });
            onValue(notesRef, (snapshot) => { cacheNotes = snapshot.val() || {}; debouncedApplyData(); });
            onValue(customTextRef, (snapshot) => { 
                cacheCustomTexts = snapshot.val() || {}; 
                document.querySelectorAll('thead .editable-text').forEach(el => {
                    const id = el.getAttribute('data-edit-id');
                    if (cacheCustomTexts[id] !== undefined && document.activeElement !== el) el.innerText = cacheCustomTexts[id];
                });
                debouncedApplyData(); 
            });

            // Ayar Event Listener'ları
            document.getElementById("start-date-picker").addEventListener("change", (e) => { set(ref(database, `${SHARED_PATH}settings/startDate`), e.target.value).catch(console.error); });
            targetInput.addEventListener("change", (e) => { set(ref(database, `${SHARED_PATH}settings/targetHours`), Number(e.target.value)).catch(console.error); });

            document.getElementById("add-row-btn").addEventListener("click", () => { set(ref(database, `${SHARED_PATH}settings/rowCount`), tbody.children.length + 1).catch(console.error); });
            document.getElementById("del-row-btn").addEventListener("click", () => {
                if (tbody.children.length <= 28) return alert("Asgari 28 günlük kamp planının altına düşülemez!");
                if(confirm("Son satırı silmek istediğinize emin misiniz? (Veriler tamamen silinecek)")) set(ref(database, `${SHARED_PATH}settings/rowCount`), tbody.children.length - 1).catch(console.error);
            });
        } 

        // Task Checkbox Tıklaması 
        tbody.addEventListener("change", (e) => {
            if (e.target.classList.contains("task-checkbox")) { 
                e.target.nextElementSibling.classList.toggle("completed-text", e.target.checked);
                updateStats(); 
                set(ref(database, `${SHARED_PATH}tasks/` + e.target.id), e.target.checked).catch(console.error); 
            }
        });

        // Toplu Gün Tamamlama 
        tbody.addEventListener("click", (e) => {
            if (e.target.classList.contains("btn-complete-day")) {
                const tr = e.target.closest('tr');
                const rowTasks = tr.querySelectorAll(".task-checkbox");
                let allChecked = Array.from(rowTasks).every(box => box.checked);
                let newState = !allChecked;
                let updates = {};
                
                rowTasks.forEach(box => { 
                    updates[box.id] = newState; 
                    box.checked = newState; 
                    box.nextElementSibling?.classList.toggle("completed-text", newState);
                });
                updateStats();
                
                update(tasksRef, updates).catch(err => {
                    console.error(err);
                    alert("Günü tamamlarken veritabanı hatası oluştu!");
                }); 
            }
        });

        const saveNote = debounce((id, value) => { set(ref(database, `${SHARED_PATH}notes/` + id), value).catch(console.error); }, 800);
        tbody.addEventListener("input", (e) => { if (e.target.classList.contains("note-input")) saveNote(e.target.id, e.target.value); });

        const saveCustomText = debounce((id, text) => { set(ref(database, `${SHARED_PATH}customTexts/` + id), text).catch(console.error); }, 500);
        document.addEventListener('input', (e) => {
            if (e.target.classList.contains('editable-text')) {
                const id = e.target.getAttribute('data-edit-id');
                saveCustomText(id, e.target.innerText);
                if (id.startsWith('th-time-') || id.startsWith('th-subj-')) updateStats();
            }
        });

        document.getElementById('note-search').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const rows = document.querySelectorAll("#table-body tr");
            rows.forEach((row) => {
                const noteInput = row.querySelector('.note-input');
                if(term === "" || (noteInput && noteInput.value.toLowerCase().includes(term))) { row.style.display = ""; } 
                else { row.style.display = "none"; }
            });
        });

        let isEditMode = false;
        const editBtn = document.getElementById("edit-btn");
        editBtn.addEventListener("click", () => {
            isEditMode = !isEditMode;
            const editables = document.querySelectorAll('.editable-text');
            if (isEditMode) {
                document.body.classList.add("edit-mode");
                editBtn.innerHTML = "💾 Kaydet"; 
                editBtn.classList.add("active");
                editables.forEach(el => el.setAttribute("contenteditable", "true"));
            } else {
                document.body.classList.remove("edit-mode");
                editBtn.innerHTML = "✏️ Düzenle"; 
                editBtn.classList.remove("active");
                editables.forEach(el => el.removeAttribute("contenteditable"));
                editables.forEach(el => { el.innerText = el.innerText.trim(); }); 
            }
        });

        const currentTheme = localStorage.getItem("theme") || "light";
        document.documentElement.setAttribute("data-theme", currentTheme);
        document.getElementById("theme-toggle").addEventListener("click", () => {
            const theme = document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light";
            document.documentElement.setAttribute("data-theme", theme);
            localStorage.setItem("theme", theme);
            updateStats(); 
        });

        document.getElementById("reset-btn").addEventListener("click", () => {
            settingsMenu.classList.remove('show-dropdown'); 
            if (confirm("🚨 DİKKAT! Tüm ilerleme, notlar ve kamp programı SİLİNECEK.\nSadece boş bir planlama tablosu kalacak.\n\nDevam etmek istiyor musun?")) {
                const btn = document.getElementById("reset-btn");
                btn.innerHTML = "⏳ Siliniyor..."; 
                btn.disabled = true;
                
                Promise.all([
                    remove(ref(database, `${SHARED_PATH}tasks`)), 
                    remove(ref(database, `${SHARED_PATH}notes`)), 
                    remove(ref(database, `${SHARED_PATH}customTexts`)), 
                    set(ref(database, `${SHARED_PATH}settings/rowCount`), 28)
                ]).then(() => {
                    alert("Tüm veriler temizlendi. Karşında planlamanı bekleyen boş bir tablo var!");
                    window.location.reload(); 
                }).catch(err => {
                    console.error("Sıfırlama hatası:", err);
                    alert("Veriler sıfırlanırken bir hata oluştu.");
                    btn.innerHTML = "🗑️ Tabloyu Sıfırla"; 
                    btn.disabled = false;
                });
            }
        });

        const importBtn = document.getElementById('import-trigger-btn');
        const fileInput = document.getElementById('import-file');
        importBtn.addEventListener('click', () => {
            settingsMenu.classList.remove('show-dropdown');
            fileInput.click();
        });
        
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (!data || typeof data !== 'object' || (!data.tasks && !data.notes && !data.customTexts && !data.settings)) {
                        return alert('Geçersiz yedek dosyası (Beklenen kamp verileri eksik).');
                    }
                    if(confirm("Yedek yükleniyor. Mevcut online verilerin tamamen SİLİNİP bu dosyadakilerle DEĞİŞTİRİLECEK.\n\nEmin misin?")) {
                        set(userRootRef, data).then(() => { 
                            alert("Yedek başarıyla yüklendi!"); 
                            window.location.reload(); 
                        }).catch(err => {
                            console.error(err);
                            alert("Yedek yüklenirken bir veritabanı hatası oluştu: " + err.message);
                        });
                    }
                } catch(err) { alert("Geçersiz dosya formatı veya bozuk JSON!"); }
            };
            reader.readAsText(file);
        });

        document.getElementById("export-btn").addEventListener("click", () => {
            settingsMenu.classList.remove('show-dropdown');
            const backupData = { tasks: cacheTasks, notes: cacheNotes, customTexts: cacheCustomTexts, settings: { startDate: currentStartDate, rowCount: tbody.children.length, targetHours: currentTarget } };
            const dataStr = JSON.stringify(backupData, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a"); a.href = url; a.download = `YKS_Kamp_Yedek_${new Date().toISOString().split('T')[0]}.json`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        });

        document.getElementById("notify-btn").addEventListener("click", () => {
            settingsMenu.classList.remove('show-dropdown');
            if (!("Notification" in window)) { alert("Tarayıcın bildirimleri desteklemiyor."); return; }
            if (Notification.permission === "granted") { 
                new Notification("Kamp Takip Pro", { body: "Bildirimler zaten aktif! Her akşam 20:00'da hatırlatıcı gönderilecek." }); 
            } else if (Notification.permission !== "denied") {
                Notification.requestPermission().then(permission => {
                    if (permission === "granted") new Notification("Harika!", { body: "Artık sekme açık kaldıkça her akşam saat 20:00'da hedefini hatırlatacağım." });
                });
            }
        });

        setInterval(() => {
            const now = new Date();
            if (now.getHours() === 20 && now.getMinutes() === 0) {
                if (Notification.permission === "granted") {
                    const todayZero = new Date(); todayZero.setHours(0,0,0,0);
                    let todayTotalHours = 0;
                    
                    document.querySelectorAll("#table-body tr").forEach((row, index) => {
                        let dateCell = row.querySelector('.date-cell');
                        if(dateCell && new Date(dateCell.dataset.fulldate).getTime() === todayZero.getTime()) {
                            const hourText = document.getElementById(`hour-${index+1}`).innerText;
                            todayTotalHours = parseFloat(hourText) || 0;
                        }
                    });

                    if(todayTotalHours < currentTarget) {
                        new Notification("Kamp Takip Pro Hatırlatıcı", { body: `Günün bitmesine az kaldı! Bugün ${todayTotalHours} saat çalıştın. Hedefin ise ${currentTarget} saat. Haydi masaya!` });
                    } else {
                        new Notification("Kamp Takip Pro Tebrikler!", { body: `Bugünkü ${currentTarget} saatlik hedefine ulaştın. Harika bir iş çıkardın!` });
                    }
                }
            }
        }, 60000); 
    });
</script>

</body>
