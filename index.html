<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#6c5ce7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>YKS Kamp Takip Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-color: #f8f9fa; --card-bg: #ffffff; --text-color: #2d3436; --secondary-text: #636e72;
            --table-border: #dfe6e9; --header-bg: linear-gradient(135deg, #6c5ce7, #a29bfe);
            --row-even: #f1f2f6; --row-odd: #ffffff; --highlight: #fdcb6e; --accent: #00b894;
            --edit-color: #0984e3; --danger-color: #ff7675; --stat-bg: #e0f2f1;
            --past-day-bg: #e2e8f0; --dropdown-hover: #f1f2f6;
        }

        [data-theme="dark"] {
            --bg-color: #0f172a; --card-bg: #1e293b; --text-color: #f8fafc; --secondary-text: #94a3b8;
            --table-border: #334155; --header-bg: linear-gradient(135deg, #4f46e5, #818cf8);
            --row-even: #1e293b; --row-odd: #0f172a; --highlight: #eab308; --accent: #10b981;
            --edit-color: #3b82f6; --danger-color: #ef4444; --stat-bg: #064e3b;
            --past-day-bg: #162032; --dropdown-hover: #334155;
        }

        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color); transition: background 0.3s ease, color 0.3s ease; -webkit-tap-highlight-color: transparent; }

        .sticky-header { position: sticky; top: 0; z-index: 100; background-color: var(--bg-color); padding: 15px 20px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); backdrop-filter: blur(8px); border-bottom: 1px solid var(--table-border); }

        .controls { max-width: 1300px; margin: 0 auto 15px auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .controls-left, .controls-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

        .btn { padding: 8px 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
        .btn:active { transform: scale(0.95); }
        .btn-theme { background: #636e72; color: white; }
        .btn-edit { background: var(--edit-color); color: white; }
        .btn-edit.active { background: var(--accent); animation: pulse 2s infinite; }
        
        .dropdown { position: relative; display: inline-block; }
        .dropdown-content { display: none; position: absolute; right: 0; top: 110%; background-color: var(--card-bg); min-width: 160px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2); border-radius: 8px; z-index: 1000; border: 1px solid var(--table-border); overflow: hidden; }
        .dropdown-content .drop-item { width: 100%; text-align: left; border-radius: 0; border: none; padding: 12px 16px; background: transparent; color: var(--text-color); font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; gap: 8px; }
        .dropdown-content .drop-item:hover { background-color: var(--dropdown-hover); }
        .dropdown-content .danger-item { color: var(--danger-color); }
        .show-dropdown { display: block; }
        
        .row-controls { display: flex; gap: 10px; width: 100%; max-width: 1300px; margin-top: 15px; }
        .btn-add-row { background: var(--accent); color: white; flex: 1; justify-content: center; padding: 12px; font-size: 14px; }
        .btn-del-row { background: var(--danger-color); color: white; flex: 1; justify-content: center; padding: 12px; font-size: 14px; }

        .setting-container { display: flex; align-items: center; gap: 8px; background: var(--card-bg); padding: 6px 12px; border-radius: 8px; border: 1px solid var(--table-border); font-size: 13px; font-weight: 600; }
        .setting-container input { border: none; background: transparent; color: var(--text-color); font-family: inherit; font-weight: bold; outline: none; cursor: pointer; }
        
        .connection-status { font-size: 11px; font-weight: bold; padding: 6px 10px; border-radius: 20px; display: flex; align-items: center; gap: 5px; }
        .status-online { background: rgba(0, 184, 148, 0.15); color: var(--accent); }
        .status-offline { background: rgba(255, 118, 117, 0.15); color: var(--danger-color); }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 184, 148, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(0, 184, 148, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 184, 148, 0); } }

        .progress-wrapper { max-width: 1300px; margin: 0 auto; }
        .progress-header { display: flex; justify-content: space-between; font-size: 14px; font-weight: 600; margin-bottom: 8px; align-items: center; flex-wrap: wrap; gap:10px; }
        .progress-bar-container { width: 100%; height: 10px; background-color: var(--table-border); border-radius: 20px; overflow: hidden; margin-bottom: 10px; }
        .progress-bar-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }

        .stats-container { display: flex; flex-wrap: wrap; gap: 8px; font-size: 12px; font-weight: 600; align-items: center; }
        .stat-badge { background: var(--card-bg); border: 1px solid var(--table-border); padding: 5px 10px; border-radius: 6px; display: flex; gap: 6px; align-items: center; }
        .stat-badge span { color: var(--accent); }
        .stat-hours { background: var(--stat-bg); border-color: transparent; }
        .streak-badge { background: linear-gradient(45deg, #ff9f43, #ee5253); color: white; border: none; }
        .countdown-badge { background: #222f3e; color: #ff9f43; border: none; letter-spacing: 0.5px; }

        .content { padding: 25px 20px; display: flex; flex-direction: column; align-items: center; }
        .table-container { width: 100%; max-width: 1300px; background-color: var(--card-bg); border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); overflow-x: auto; border: 1px solid var(--table-border); margin-bottom: 20px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 1100px; color: var(--text-color); }
        th, td { border-bottom: 1px solid var(--table-border); padding: 12px; text-align: left; color: var(--text-color); vertical-align: middle; transition: background 0.3s; }
        thead th { background: var(--header-bg); color: white; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; font-size: 11px; }
        
        .time-tag { display: block; font-size: 10px; margin-top: 5px; opacity: 0.9; background: rgba(255,255,255,0.2); padding: 2px 6px; border-radius: 4px; width: fit-content; }
        tr:nth-child(even) { background-color: var(--row-even); }
        tr:nth-child(odd) { background-color: var(--row-odd); }
        
        .past-day { background-color: var(--past-day-bg) !important; opacity: 0.65; filter: grayscale(0.5); }
        .past-day:hover { opacity: 1; filter: none; }
        
        .date-wrapper { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .btn-complete-day { background: transparent; border: 1px solid var(--table-border); border-radius: 4px; cursor: pointer; font-size: 12px; padding: 3px 6px; transition: all 0.2s; color: var(--text-color); opacity: 0.5; }
        .btn-complete-day:hover { background: var(--accent); color: white; opacity: 1; border-color: var(--accent); }

        .task-label { display: flex; align-items: center; cursor: pointer; gap: 10px; color: inherit; transition: transform 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .swiping-right { transform: translateX(12px); color: var(--accent); }
        .swiping-left { transform: translateX(-12px); color: var(--danger-color); }
        .completed-text { text-decoration: line-through; opacity: 0.7; }
        
        .note-input { width: 100%; min-width: 160px; padding: 8px; border: 1px solid var(--table-border); border-radius: 6px; background: var(--card-bg); color: var(--text-color); font-size: 12px; font-family: inherit; resize: vertical; min-height: 40px; box-sizing: border-box; transition: border-color 0.2s; }
        .note-input:focus { outline: none; border-color: var(--accent); }
        .search-input { min-width: auto; height: 35px; width: 200px; border-radius: 20px; padding: 0 15px; }

        .today-highlight, .today-highlight td { background-color: var(--highlight) !important; color: #000000 !important; font-weight: 700 !important; }
        .today-highlight .task-label, .today-highlight .task-text, .today-highlight .completed-text { color: #000000 !important; }
        .today-highlight .time-tag { background: rgba(0,0,0,0.15) !important; color: #111111 !important; }
        .today-highlight .note-input { border-color: #555555 !important; color: #000000 !important; background: rgba(255,255,255,0.4) !important; }
        .today-highlight .note-input::placeholder { color: #444444 !important; }
        .today-highlight .hour-badge { background: #000000 !important; color: var(--highlight) !important; }
        .today-highlight .btn-complete-day { border-color: #000; color: #000; opacity: 0.8; }

        .hour-badge { background: var(--secondary-text); color: white; padding: 5px 10px; border-radius: 20px; font-weight: bold; font-size: 12px; display: inline-block; min-width: 50px; text-align: center; transition: background 0.3s; }
        .target-met { background: var(--accent) !important; }
        .target-missed { background: var(--danger-color) !important; }

        .editable-text { transition: all 0.2s; padding: 4px 8px; border-radius: 4px; border: 1px solid transparent; min-width: 70px; display: inline-block; min-height: 18px; }
        body.edit-mode .editable-text { border: 1px dashed var(--accent); background: rgba(0, 184, 148, 0.1); cursor: text; }
        body.edit-mode .editable-text:focus { outline: none; background: rgba(0, 184, 148, 0.2); border-style: solid; }
        body.edit-mode .task-label { cursor: default; }

        .dashboard { width: 100%; max-width: 1300px; display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-top: 20px; }
        .dash-card { background: var(--card-bg); padding: 24px; border-radius: 16px; border: 1px solid var(--table-border); box-shadow: 0 10px 30px -10px rgba(0,0,0,0.08); transition: transform 0.3s ease; }
        .dash-card:hover { transform: translateY(-3px); }
        .dash-card h3 { margin-top: 0; font-size: 15px; margin-bottom: 20px; border-bottom: 2px solid var(--row-even); padding-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .chart-container { position: relative; height: 260px; width: 100%; display: flex; justify-content: center; }
        
        .weekly-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; }
        .week-item { background: linear-gradient(145deg, var(--bg-color), var(--row-even)); padding: 15px 10px; border-radius: 12px; text-align: center; border: 1px solid var(--table-border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); display: flex; flex-direction: column; gap: 5px; }
        .week-item .w-title { font-weight: 700; color: var(--secondary-text); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
        .week-item .w-val { font-size: 18px; color: var(--text-color); font-weight: 900; }
        .week-item .w-val span { font-size: 11px; font-weight: 600; color: var(--secondary-text); }

        .heatmap-card { grid-column: 1 / -1; }
        .heatmap-wrapper { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .heatmap-day { width: 16px; height: 16px; border-radius: 4px; background-color: var(--row-even); position: relative; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; border: 1px solid rgba(128, 128, 128, 0.2); }
        .heatmap-day:hover { transform: scale(1.3); z-index: 10; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }

        .heatmap-day[data-level="0"] { background-color: var(--row-even); }
        .heatmap-day[data-level="1"] { background-color: #9be9a8; }
        .heatmap-day[data-level="2"] { background-color: #40c463; }
        .heatmap-day[data-level="3"] { background-color: #30a14e; }
        .heatmap-day[data-level="4"] { background-color: #216e39; }

        [data-theme="dark"] .heatmap-day[data-level="0"] { background-color: #334155; }
        [data-theme="dark"] .heatmap-day[data-level="1"] { background-color: #0e4429; }
        [data-theme="dark"] .heatmap-day[data-level="2"] { background-color: #006d32; }
        [data-theme="dark"] .heatmap-day[data-level="3"] { background-color: #26a641; }
        [data-theme="dark"] .heatmap-day[data-level="4"] { background-color: #39d353; }

        @media (max-width: 768px) {
            table { min-width: auto; font-size: 12px; }
            th, td { padding: 10px 6px; }
            .time-tag { font-size: 9px; padding: 1px 4px; }
            .hour-badge { font-size: 10px; padding: 3px 6px; }
            .note-input { font-size: 11px; padding: 6px; min-width: 100px; min-height: 35px; }
            .controls { justify-content: center; }
            .setting-container { width: 100%; justify-content: center; }
            .stats-container { justify-content: center; }
            .dashboard { grid-template-columns: 1fr; }
            .search-input { width: 100%; margin-top: 5px; }
            .btn-complete-day { padding: 8px 12px; font-size: 16px; background: var(--row-even); border: 2px solid var(--table-border); border-radius: 8px; opacity: 0.8; }
        }        /* Ayarlar Menüsü İyileştirmesi */
        .dropdown-content { min-width: 220px; padding: 8px 0; border-radius: 12px; }
        .dropdown-content .drop-item { display: flex; align-items: center; justify-content: space-between; gap: 10px; white-space: nowrap; padding: 12px 16px; width: 100%; text-align: left; border: none; background: transparent; color: var(--text-color); font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .dropdown-content input[type="number"] { width: 45px !important; padding: 4px; border-radius: 6px; border: 1px solid var(--table-border) !important; background: var(--bg-color) !important; color: var(--text-color) !important; text-align: center; font-weight: 600; }
        .dropdown-content .drop-item:hover { background-color: var(--dropdown-hover); }

    </style>
</head>
<body>

<div class="sticky-header">
        <div class="controls">
        <div class="controls-left">
            <button class="btn btn-theme" id="theme-toggle" title="Karanlık/Aydınlık Mod">🌙 Mod</button>
            <button class="btn btn-edit" id="edit-btn">✏️ Düzenle</button>
            <div class="setting-container" title="Kamp Başlangıç Tarihi">🗓️ <input type="date" id="start-date-picker"></div>
            <input type="text" id="note-search" class="note-input search-input" placeholder="🔍 Notlarda ara...">
        </div>
        <div class="controls-right">
            <span id="connection-status" class="connection-status status-offline">⚪ Yükleniyor...</span>
            <div class="dropdown">
                <button class="btn btn-theme" id="settings-toggle">⚙️ Ayarlar</button>
                <div class="dropdown-content" id="settings-menu">
                    <div class="drop-item" style="cursor: default;">🎯 Hedef (Saat): <input type="number" id="daily-target" value="6" min="1" max="24" style="width:40px; margin-left:auto; border-radius:4px; border:1px solid var(--table-border); background:var(--bg-color); color:var(--text-color); padding:2px; text-align:center;"></div>
                    <div class="drop-item" style="cursor: default;">📚 Ders Sütunu: <input type="number" id="col-count" value="5" min="1" max="10" style="width:40px; margin-left:auto; border-radius:4px; border:1px solid var(--table-border); background:var(--bg-color); color:var(--text-color); padding:2px; text-align:center;"></div>
                    
                    <button class="drop-item" id="notify-btn">🔔 Bildirimleri Aç (Test)</button>
                    <button class="drop-item" id="export-btn">📥 Yedeği İndir</button>
                    <button class="drop-item" id="import-trigger-btn">📤 Yedek Yükle</button>
                    <button class="drop-item danger-item" id="reset-btn">🗑️ Tabloyu Sıfırla</button>
                </div>
            </div>
            <input type="file" id="import-file" style="display:none" accept=".json">
        </div>
    </div>

    </div>
    <div class="progress-wrapper">
        <div class="progress-header">
            <span id="current-date-info">YKS Kamp Takvimi</span>
                        <div style="display:flex; gap:10px; align-items:center; flex-wrap: wrap;">
                <span class="stat-badge streak-badge" id="streak-counter" title="Hedefe ulaşılan peş peşe günler">🔥 Seri: 0</span>
                <span class="stat-badge countdown-badge" id="yks-countdown">YKS: Hesaplanıyor...</span>
                <span id="progress-text">%0 Tamamlandı</span>
            </div>

        </div>
        <div class="progress-bar-container">
            <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
        <div class="stats-container" id="stats-panel"></div>
    </div>
</div>

<div class="content">
    <div class="table-container">
        <table id="schedule-table">
            <thead>
                <tr id="header-row">
                    </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
    
    <div class="row-controls">
        <button class="btn btn-add-row" id="add-row-btn">➕ Yeni Gün Ekle</button>
        <button class="btn btn-del-row" id="del-row-btn">➖ Son Günü Sil</button>
    </div>

    <div class="dashboard">
        <div class="dash-card heatmap-card">
            <h3>🟩 Çalışma Isı Haritası (Günlük Performans)</h3>
            <div class="heatmap-wrapper" id="heatmap-container"></div>
        </div>

        <div class="dash-card">
            <h3>📊 Ders Dağılımı (Saat)</h3>
            <div class="chart-container">
                <canvas id="trendChart"></canvas>
            </div>
        </div>
        <div class="dash-card">
            <h3>📚 Ders Bazlı Toplam Süre</h3>
            <div class="weekly-grid" id="weekly-summary-grid"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // OFFLINE-FIRST: IndexedDB Setup
    const dbPromise = new Promise((resolve, reject) => {
        const req = indexedDB.open("YksKampProDB", 1);
        req.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains("kampCache")) { db.createObjectStore("kampCache"); }
        };
        req.onsuccess = (e) => resolve(e.target.result);
        req.onerror = (e) => reject(e.target.error);
    });

    async function saveToIDB(key, data) {
        try {
            const db = await dbPromise;
            const tx = db.transaction("kampCache", "readwrite");
            tx.objectStore("kampCache").put(data, key);
        } catch(e) { console.warn("IDB Save Error:", e); }
    }

    async function getFromIDB(key) {
        try {
            const db = await dbPromise;
            return new Promise(resolve => {
                const req = db.transaction("kampCache", "readonly").objectStore("kampCache").get(key);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => resolve(null);
            });
        } catch(e) { return null; }
    }

    const firebaseConfig = {
        apiKey: "AIzaSyCtlXFnB8OTQ-P_QKH2fAexX8UlLTRpXcg",
        authDomain: "yks-kamp-13f68.firebaseapp.com",
        databaseURL: "https://yks-kamp-13f68-default-rtdb.firebaseio.com",
        projectId: "yks-kamp-13f68",
        storageBucket: "yks-kamp-13f68.firebasestorage.app"
    };

    const SHARED_PATH = "yks_kamp_pro_shared/kamp/";
    const DEFAULT_START_DATE = "2026-04-21";
    
    let database, tasksRef, notesRef, customTextRef, settingsRef, userRootRef;
    
    document.addEventListener("DOMContentLoaded", async () => {
        const tbody = document.getElementById("table-body");
        const headerRow = document.getElementById("header-row");
        const progressFill = document.getElementById("progress-fill");
        const progressText = document.getElementById("progress-text");
        const statsPanel = document.getElementById("stats-panel");
        
        let chartInstance = null;
        let currentTarget = 6;
        let currentCols = 5;
        let currentRowCount = 28;
        let currentStartDate = DEFAULT_START_DATE;

        let cacheTasks = {};
        let cacheNotes = {};
        let cacheCustomTexts = {};
        let isEditMode = false;

        const today = new Date();
        const days = ["Pazar", "Pazartesi", "Salı", "Çarşamba", "Perşembe", "Cuma", "Cumartesi"];
        const months = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];

        // 1. Önce IndexedDB'den Hızlı Yükleme (Offline First)
        const [idbTasks, idbNotes, idbTexts, idbSettings] = await Promise.all([
            getFromIDB('tasks'), getFromIDB('notes'), getFromIDB('customTexts'), getFromIDB('settings')
        ]);
        if (idbTasks) cacheTasks = idbTasks;
        if (idbNotes) cacheNotes = idbNotes;
        if (idbTexts) cacheCustomTexts = idbTexts;
        if (idbSettings) {
            currentStartDate = idbSettings.startDate || DEFAULT_START_DATE;
            currentTarget = idbSettings.targetHours || 6;
            currentCols = idbSettings.colCount || 5;
            currentRowCount = idbSettings.rowCount || 28;
        }

        const renderTableStructure = () => {
            let thHtml = `<th>Tarih</th>`;
            for(let i=0; i<currentCols; i++) {
                const subjDef = `Ders ${i+1}`;
                const timeDef = i === 0 ? "08:30 - 10:30" : "00:00 - 00:00";
                thHtml += `<th><span class="editable-text" data-edit-id="th-subj-${i}" id="th-subj-${i}-text">${subjDef}</span> <span class="time-tag editable-text" data-edit-id="th-time-${i}">${timeDef}</span></th>`;
            }
            thHtml += `<th>Günün Notu</th><th>Toplam Saat</th>`;
            headerRow.innerHTML = thHtml;

            tbody.innerHTML = "";
            for(let r=0; r<currentRowCount; r++) addRowToDOM(r);

            if(isEditMode) document.querySelectorAll('.editable-text').forEach(el => el.setAttribute("contenteditable", "true"));
            
            document.getElementById("start-date-picker").value = currentStartDate;
            document.getElementById("daily-target").value = currentTarget;
            document.getElementById("col-count").value = currentCols;
        };

        const addRowToDOM = (rowIndex) => {
            const tr = document.createElement("tr");
            let html = `<td><div class="date-wrapper"><span class="date-cell" style="font-weight: 600;"></span><button class="btn-complete-day" title="Tüm Günü Tamamla/Temizle">✅</button></div></td>`;
            
            for (let c = 0; c < currentCols; c++) {
                // YENİ GÜVENLİ ID YAPISI: task-{satır}-{sütun}
                const taskId = `task-${rowIndex}-${c}`;
                const editId = `task-text-${rowIndex}-${c}`;
                html += `<td><div class="task-label"><input type="checkbox" id="${taskId}" class="task-checkbox"><span class="task-text editable-text" data-edit-id="${editId}">Ders/Konu Ekle</span></div></td>`;
            }

            const dayCounter = rowIndex + 1;
            html += `<td><textarea class="note-input" id="note-${dayCounter}" placeholder="Günlük not..."></textarea></td><td><span class="hour-badge" id="hour-${dayCounter}">0 Saat</span></td>`;
            tr.innerHTML = html;
            tbody.appendChild(tr);
        };

        // UI İlk Hızlı Çizimi
        renderTableStructure();
        
        // --- YARDIMCI FONKSİYONLAR ---
        const debounce = (func, delay) => {
            let timeout;
            return (...args) => { clearTimeout(timeout); timeout = setTimeout(() => func(...args), delay); };
        };

        const getHoursFromText = (text) => {
            if (!text) return 0;
            const timeMatch = text.match(/(\d{1,2})[:\.](\d{2})\s*-\s*(\d{1,2})[:\.](\d{2})/);
            if (timeMatch) {
                const startMins = parseInt(timeMatch[1]) * 60 + parseInt(timeMatch[2]);
                const endMins = parseInt(timeMatch[3]) * 60 + parseInt(timeMatch[4]);
                let diff = endMins - startMins;
                if (diff < 0) diff += 24 * 60; 
                return diff / 60;
            }
            const numMatch = text.match(/[\d\.]+/);
            if (numMatch) return parseFloat(numMatch[0]) || 0;
            return 0; 
        };

        const toDateStr = (d) => {
             const year = d.getFullYear();
             const month = String(d.getMonth() + 1).padStart(2, '0');
             const day = String(d.getDate()).padStart(2, '0');
             return `${year}-${month}-${day}`;
        };

        const updateDatesInTable = () => {
            const parts = currentStartDate.split('-');
            const startDateObj = new Date(parts[0], parts[1] - 1, parts[2]); // Zaman dilimi kaymalarına karşı güvenli
            const dateCells = document.querySelectorAll(".date-cell");
            const todayZero = new Date(); todayZero.setHours(0,0,0,0);
            
            dateCells.forEach((cell, index) => {
                const rowDate = new Date(startDateObj);
                rowDate.setDate(rowDate.getDate() + index);
                
                const dateText = `${rowDate.getDate()} ${months[rowDate.getMonth()]} ${days[rowDate.getDay()]}`;
                cell.innerText = dateText;
                cell.dataset.fulldate = toDateStr(rowDate);
                
                const tr = cell.closest('tr');
                tr.classList.remove("today-highlight", "past-day");
                
                if (rowDate.getTime() === todayZero.getTime()) {
                    tr.classList.add("today-highlight");
                    if (index === 0 || !tr.hasAttribute("data-scrolled")) {
                        tr.setAttribute("data-scrolled", "true");
                        setTimeout(() => tr.scrollIntoView({ behavior: 'smooth', block: 'center' }), 500);
                    }
                } else if (rowDate < todayZero) { tr.classList.add("past-day"); }
            });
        };

        const updateStats = () => {
            const rows = document.querySelectorAll("#table-body tr");
            let completedHours = 0, remainingHours = 0;
            let subjStats = new Array(currentCols).fill(0);
            let subjTotals = new Array(currentCols).fill(0);
            let subjTotalHoursArr = new Array(currentCols).fill(0);
            
            const dailyHoursMap = {};

            rows.forEach((row, rowIndex) => {
                let rowTotalHours = 0;
                let dateCell = row.querySelector('.date-cell');
                let rowDateStr = dateCell ? dateCell.dataset.fulldate : null; 
                const rowTasks = row.querySelectorAll(".task-checkbox");
                
                rowTasks.forEach((box, cIndex) => {
                    const headerTimeSpan = document.querySelector(`th span[data-edit-id="th-time-${cIndex}"]`);
                    const timeStr = headerTimeSpan ? headerTimeSpan.innerText : "";
                    const currentHeaderHrs = getHoursFromText(timeStr);
                    
                    subjTotals[cIndex]++;
                    
                    if (box.checked) {
                        const taskData = cacheTasks[box.id];
                        const hrs = (taskData && taskData.hours !== undefined) ? taskData.hours : currentHeaderHrs;
                        rowTotalHours += hrs; completedHours += hrs;
                        subjStats[cIndex]++; subjTotalHoursArr[cIndex] += hrs;
                    } else {
                        remainingHours += currentHeaderHrs;
                    }
                });

                if (rowDateStr) dailyHoursMap[rowDateStr] = rowTotalHours;

                const hourDisplay = document.getElementById(`hour-${rowIndex + 1}`);
                if (hourDisplay) {
                    hourDisplay.innerText = `${Number.isInteger(rowTotalHours) ? rowTotalHours : rowTotalHours.toFixed(1)} Saat`;
                    hourDisplay.classList.remove('target-met', 'target-missed');
                    if(rowTotalHours >= currentTarget) hourDisplay.classList.add('target-met');
                    else if(rowTotalHours > 0) hourDisplay.classList.add('target-missed');
                }
            });

            // Heatmap
            const container = document.getElementById('heatmap-container');
            container.innerHTML = '';
            rows.forEach(row => {
                const dateCell = row.querySelector('.date-cell');
                if (!dateCell) return;
                const dateStr = dateCell.dataset.fulldate;
                const hours = dailyHoursMap[dateStr] || 0;
                let level = 0;
                if (hours > 0 && hours < currentTarget / 2) level = 1;
                else if (hours >= currentTarget / 2 && hours < currentTarget) level = 2;
                else if (hours >= currentTarget && hours < currentTarget * 1.5) level = 3;
                else if (hours >= currentTarget * 1.5) level = 4;

                const box = document.createElement('div');
                box.className = 'heatmap-day';
                box.setAttribute('data-level', level);
                box.title = `${dateCell.innerText} \nÇalışma: ${hours.toFixed(1)} Saat\nHedef: ${currentTarget} Saat`;
                container.appendChild(box);
            });
            // --- STREAK (SERİ) HESAPLAMA ---
            let currentStreak = 0;
            const todayZ = new Date(); 
            todayZ.setHours(0,0,0,0);
            
            rows.forEach(row => {
                const dateCell = row.querySelector('.date-cell');
                if (!dateCell) return;
                const dateStr = dateCell.dataset.fulldate;
                const hours = dailyHoursMap[dateStr] || 0;
                
                const parts = dateStr.split('-');
                const rowDate = new Date(parts[0], parts[1]-1, parts[2]);

                if (rowDate < todayZ) { 
                    if (hours >= currentTarget) currentStreak++;
                    else currentStreak = 0; 
                } else if (rowDate.getTime() === todayZ.getTime()) { 
                    if (hours >= currentTarget) currentStreak++;
                }
            });

            const streakEl = document.getElementById('streak-counter');
            if (streakEl) streakEl.innerHTML = `🔥 Seri: ${currentStreak}`;

            // Dashboard & İstatistikler
            const subjNames = [];
            for(let i=0; i<currentCols; i++) {
                const el = document.getElementById(`th-subj-${i}-text`);
                subjNames.push(el ? el.innerText.split(' ')[0] : `Ders ${i+1}`);
            }

            let statsHtml = `<div class="stat-badge stat-hours" title="Çalışılan / Kalan Toplam Saat">⏱️ <span>${completedHours.toFixed(1)}s</span> / <span>${remainingHours.toFixed(1)}s</span></div>`;
            for(let i=0; i<currentCols; i++) {
                const pct = subjTotals[i] === 0 ? 0 : Math.round((subjStats[i] / subjTotals[i]) * 100);
                statsHtml += `<div class="stat-badge">${subjNames[i]}: <span>%${pct}</span></div>`;
            }
            statsPanel.innerHTML = statsHtml;
            
            // Grafik Çizimi
            const ctx = document.getElementById('trendChart').getContext('2d');
            const colors = ['#6c5ce7', '#00cec9', '#fdcb6e', '#e17055', '#00b894', '#e84393', '#0984e3', '#d63031'];
            if(chartInstance) chartInstance.destroy();
            Chart.defaults.color = getComputedStyle(document.body).getPropertyValue('--text-color').trim();
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: subjNames, datasets: [{ data: subjTotalHoursArr, backgroundColor: colors.slice(0, currentCols), borderWidth: 2, borderColor: 'transparent' }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
            });

            const weeklyGrid = document.getElementById('weekly-summary-grid');
            weeklyGrid.innerHTML = "";
            subjNames.forEach((name, i) => {
                weeklyGrid.innerHTML += `<div class="week-item"><span class="w-title">${name}</span><span class="w-val">${subjTotalHoursArr[i].toFixed(1)} <span>Saat</span></span></div>`;
            });
        };

        const applyDataToUI = () => {
            updateDatesInTable();
            let globalCheckedCount = 0;
            const rows = document.querySelectorAll("#table-body tr");
            const totalTasks = rows.length * currentCols;

            rows.forEach((row, rowIndex) => {
                row.querySelectorAll(".task-checkbox").forEach(box => {
                    const textSpan = box.nextElementSibling;
                    const taskData = cacheTasks[box.id];
                    const isChecked = taskData && taskData.done === true;
                    box.checked = isChecked;
                    if (isChecked) { textSpan.classList.add("completed-text"); globalCheckedCount++; } 
                    else { textSpan.classList.remove("completed-text"); }
                });

                row.querySelectorAll('.editable-text').forEach(el => {
                    const id = el.getAttribute('data-edit-id');
                    if (cacheCustomTexts[id] !== undefined && document.activeElement !== el) {
                        el.innerText = cacheCustomTexts[id];
                    } else if (!cacheCustomTexts[id] && document.activeElement !== el && id.startsWith('task-text')) {
                         if(el.innerText !== "Ders/Konu Ekle") el.innerText = "Ders/Konu Ekle";
                    }
                });

                row.querySelectorAll('.note-input').forEach(input => {
                    if (document.activeElement !== input) input.value = cacheNotes[input.id] || "";
                });
            });

            const percent = totalTasks === 0 ? 0 : Math.round((globalCheckedCount / totalTasks) * 100);
            progressFill.style.width = `${percent}%`;
            progressText.innerText = `%${percent} Tamamlandı`;
            updateStats();
        };
        const debouncedApplyData = debounce(applyDataToUI, 150);
        
        applyDataToUI(); // Yerel veriyle ilk çizimi tamamla

        // --- FIREBASE BAĞLANTISI ---
        const app = initializeApp(firebaseConfig);
        database = getDatabase(app);
        userRootRef = ref(database, SHARED_PATH);
        tasksRef = ref(database, `${SHARED_PATH}tasks/`);
        notesRef = ref(database, `${SHARED_PATH}notes/`);
        customTextRef = ref(database, `${SHARED_PATH}customTexts/`);
        settingsRef = ref(database, `${SHARED_PATH}settings/`);
        const connectedRef = ref(database, '.info/connected');

                onValue(connectedRef, (snap) => {
            const cs = document.getElementById("connection-status");
            if (snap.val() === true) { cs.innerHTML = "🟢 Çevrimiçi"; cs.className = "connection-status status-online"; } 
            else { cs.innerHTML = "🔴 Çevrimdışı"; cs.className = "connection-status status-offline"; }
        });


        onValue(settingsRef, (snapshot) => {
            const s = snapshot.val() || {};
            const newCols = s.colCount || 5;
            const newRows = s.rowCount || 28;
            currentStartDate = s.startDate || DEFAULT_START_DATE;
            currentTarget = s.targetHours || 6;

            let needsRebuild = false;
            if(newCols !== currentCols) { currentCols = newCols; needsRebuild = true; }
            if(newRows !== currentRowCount) { currentRowCount = newRows; needsRebuild = true; }
            
            if(needsRebuild) renderTableStructure();

            saveToIDB('settings', s);
            debouncedApplyData();
        });

        onValue(tasksRef, (snapshot) => { cacheTasks = snapshot.val() || {}; saveToIDB('tasks', cacheTasks); debouncedApplyData(); });
        onValue(notesRef, (snapshot) => { cacheNotes = snapshot.val() || {}; saveToIDB('notes', cacheNotes); debouncedApplyData(); });
        onValue(customTextRef, (snapshot) => { 
            cacheCustomTexts = snapshot.val() || {}; 
            saveToIDB('customTexts', cacheCustomTexts);
            document.querySelectorAll('thead .editable-text').forEach(el => {
                const id = el.getAttribute('data-edit-id');
                if (cacheCustomTexts[id] !== undefined && document.activeElement !== el) el.innerText = cacheCustomTexts[id];
            });
            debouncedApplyData(); 
        });

        // --- ETKİLEŞİMLER (SWIPE & CLICKS) ---
        
        // 1. Swipe to Complete (Mobile)
        let touchstartX = 0, touchstartY = 0;
        tbody.addEventListener("touchstart", (e) => {
            touchstartX = e.changedTouches[0].screenX;
            touchstartY = e.changedTouches[0].screenY;
        }, {passive: true});

        tbody.addEventListener("touchend", (e) => {
            const touchendX = e.changedTouches[0].screenX;
            const touchendY = e.changedTouches[0].screenY;
            const diffX = touchendX - touchstartX;
            const diffY = Math.abs(touchendY - touchstartY);
            
            // Eğer dikeyde çok kayılmadıysa ve yatayda belirgin bir kaydırma varsa
            if (Math.abs(diffX) > 45 && diffY < 40) { 
                const label = e.target.closest('.task-label');
                if (label) {
                    const box = label.querySelector('.task-checkbox');
                    if (box) {
                        if (diffX > 0 && !box.checked) { // Sağa Kaydırma -> Tamamla
                            box.checked = true;
                            box.dispatchEvent(new Event("change", { bubbles: true }));
                            label.classList.add("swiping-right");
                            setTimeout(() => label.classList.remove("swiping-right"), 250);
                        } else if (diffX < 0 && box.checked) { // Sola Kaydırma -> İptal Et
                            box.checked = false;
                            box.dispatchEvent(new Event("change", { bubbles: true }));
                            label.classList.add("swiping-left");
                            setTimeout(() => label.classList.remove("swiping-left"), 250);
                        }
                    }
                }
            }
        });

        tbody.addEventListener("change", (e) => {
            if (e.target.classList.contains("task-checkbox")) { 
                const isChecked = e.target.checked;
                e.target.nextElementSibling.classList.toggle("completed-text", isChecked);
                
                const taskId = e.target.id;
                let taskData = null;
                if (isChecked) {
                    const parts = taskId.split('-'); // task-{row}-{col}
                    const colIndex = parseInt(parts[2]);
                    const headerTimeSpan = document.querySelector(`th span[data-edit-id="th-time-${colIndex}"]`);
                    taskData = { done: true, hours: getHoursFromText(headerTimeSpan ? headerTimeSpan.innerText : ""), updatedAt: Date.now() };
                }
                
                // Hem IDB hem Firebase yaz (Offline destek)
                if(taskData) cacheTasks[taskId] = taskData; else delete cacheTasks[taskId];
                saveToIDB('tasks', cacheTasks);
                updateStats(); 
                if(database) set(ref(database, `${SHARED_PATH}tasks/` + taskId), taskData).catch(console.error); 
            }
        });

        tbody.addEventListener("click", (e) => {
            if (!isEditMode && e.target.classList.contains("task-text")) {
                const checkbox = e.target.previousElementSibling;
                if(checkbox && checkbox.type === "checkbox") checkbox.click();
            }

            if (e.target.classList.contains("btn-complete-day")) {
                const tr = e.target.closest('tr');
                const rowTasks = tr.querySelectorAll(".task-checkbox");
                let allChecked = Array.from(rowTasks).every(box => box.checked);
                let newState = !allChecked;
                let updates = {};
                const now = Date.now();
                
                rowTasks.forEach(box => { 
                    const parts = box.id.split('-');
                    const colIndex = parseInt(parts[2]);
                    if (newState) {
                        const headerTimeSpan = document.querySelector(`th span[data-edit-id="th-time-${colIndex}"]`);
                        const data = { done: true, hours: getHoursFromText(headerTimeSpan ? headerTimeSpan.innerText : ""), updatedAt: now };
                        updates[box.id] = data;
                        cacheTasks[box.id] = data;
                    } else {
                        updates[box.id] = null;
                        delete cacheTasks[box.id];
                    }
                    box.checked = newState; 
                    box.nextElementSibling?.classList.toggle("completed-text", newState);
                });
                
                saveToIDB('tasks', cacheTasks);
                updateStats();
                if(database) update(tasksRef, updates).catch(console.error); 
            }
        });

        const saveCustomText = debounce((id, text) => { 
            cacheCustomTexts[id] = text; saveToIDB('customTexts', cacheCustomTexts);
            if(database) set(ref(database, `${SHARED_PATH}customTexts/` + id), text).catch(console.error); 
        }, 500);

        document.addEventListener('input', (e) => {
            if (e.target.classList.contains('editable-text')) {
                const id = e.target.getAttribute('data-edit-id');
                saveCustomText(id, e.target.innerText);
                if (id.startsWith('th-time-') || id.startsWith('th-subj-')) updateStats();
            }
        });

        const saveNote = debounce((id, value) => { 
            cacheNotes[id] = value; saveToIDB('notes', cacheNotes);
            if(database) set(ref(database, `${SHARED_PATH}notes/` + id), value).catch(console.error); 
        }, 800);
        tbody.addEventListener("input", (e) => { if (e.target.classList.contains("note-input")) saveNote(e.target.id, e.target.value); });

        // Ayarlar ve Dinleyiciler
        document.getElementById("start-date-picker").addEventListener("change", (e) => { if(database) set(ref(database, `${SHARED_PATH}settings/startDate`), e.target.value).catch(console.error); });
        document.getElementById("daily-target").addEventListener("change", (e) => { if(database) set(ref(database, `${SHARED_PATH}settings/targetHours`), Number(e.target.value)).catch(console.error); });
        document.getElementById("col-count").addEventListener("change", (e) => { 
            let val = Number(e.target.value); 
            if(val < 1) val = 1; if(val > 10) val = 10;
            if(database) set(ref(database, `${SHARED_PATH}settings/colCount`), val).catch(console.error); 
        });

        document.getElementById("add-row-btn").addEventListener("click", () => { if(database) set(ref(database, `${SHARED_PATH}settings/rowCount`), currentRowCount + 1).catch(console.error); });
        document.getElementById("del-row-btn").addEventListener("click", () => {
            if (currentRowCount <= 7) return alert("7 günün altına düşülemez!");
            if(confirm("Son satırı silmek istediğinize emin misiniz?")) if(database) set(ref(database, `${SHARED_PATH}settings/rowCount`), currentRowCount - 1).catch(console.error);
        });

        const editBtn = document.getElementById("edit-btn");
        editBtn.addEventListener("click", () => {
            isEditMode = !isEditMode;
            const editables = document.querySelectorAll('.editable-text');
            if (isEditMode) {
                document.body.classList.add("edit-mode");
                editBtn.innerHTML = "💾 Kaydet"; editBtn.classList.add("active");
                editables.forEach(el => el.setAttribute("contenteditable", "true"));
            } else {
                document.body.classList.remove("edit-mode");
                editBtn.innerHTML = "✏️ Düzenle"; editBtn.classList.remove("active");
                editables.forEach(el => { el.removeAttribute("contenteditable"); el.innerText = el.innerText.trim(); }); 
            }
        });

        const currentTheme = localStorage.getItem("theme") || "light";
        document.documentElement.setAttribute("data-theme", currentTheme);
        document.getElementById("theme-toggle").addEventListener("click", () => {
            const theme = document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light";
            document.documentElement.setAttribute("data-theme", theme);
            localStorage.setItem("theme", theme);
            updateStats(); 
        });
        
        // Ayarlar Menüsü Aç/Kapat
        document.getElementById('settings-toggle').addEventListener('click', (e) => {
            e.stopPropagation(); document.getElementById('settings-menu').classList.toggle('show-dropdown');
        });
        window.addEventListener('click', (e) => {
            if (!e.target.matches('#settings-toggle')) document.getElementById('settings-menu').classList.remove('show-dropdown');
        });

            // --- EKSİK ÖZELLİKLERİN EKLENMESİ ---

        // 1. Tabloyu Sıfırla (Reset)
        document.getElementById('reset-btn').addEventListener('click', async () => {
            if (confirm("Tüm tablo verileri, tamamlanan görevler ve notlar KALICI olarak silinecek. Emin misin?")) {
                if (database) {
                    try {
                        // Firebase üzerindeki verileri temizle (UI otomatik güncellenecek)
                        await set(ref(database, `${SHARED_PATH}tasks`), null);
                        await set(ref(database, `${SHARED_PATH}notes`), null);

                }
            }
        });

        document.getElementById('export-btn').addEventListener('click', () => {

                tasks: cacheTasks,

        document.getElementById('import-file').addEventListener('change', async (e) => {

                try {

        // --- YKS GERİ SAYIM SAYACI ---
        function updateYksCountdown() {
            // YKS 2026 tahmini tarihi: 20 Haziran 2026
            const yksDate = new Date("2026-06-20T10:15:00").getTime(); 
            const now = new Date().getTime();
            const distance = yksDate - now;

            const countdownElement = document.getElementById("yks-countdown");
            if (distance < 0) {
                countdownElement.innerHTML = "🎯 YKS Zamanı!";
                return;
            }
            
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            countdownElement.innerHTML = `⏳ YKS: ${days} Gün`;
        }
        // Sayacı ilk açılışta çalıştır ve her gün yenile
        updateYksCountdown();
        setInterval(updateYksCountdown, 1000 * 60 * 60 * 24);


        // --- AYARLAR MENÜSÜ İÇİ TIKLAMA DÜZELTMESİ ---
        // Sütun ve Hedef inputlarına tıklayınca menünün kapanmasını engeller
        document.getElementById('settings-menu').addEventListener('click', (e) => {
            if(e.target.tagName === 'INPUT') {
                e.stopPropagation();
            }
        });


        // --- BİLDİRİMLER (TEST VE ÇALIŞTIRMA) ---
        document.getElementById('notify-btn').addEventListener('click', () => {
            if (!("Notification" in window)) {
                alert("Tarayıcın masaüstü/mobil bildirimleri desteklemiyor.");
                return;
            }
            
            if (Notification.permission === "granted") {
                // İzin zaten varsa test bildirimi yolla
                new Notification("YKS Kamp Takip", {
                    body: "Bildirimler aktif! (Sekme açık kaldığı sürece çalışır)",
                });
                alert("Bildirimler açık. Sağ alttan veya üstten test bildirimi gelmiş olmalı.");
            } else if (Notification.permission !== "denied") {
                // İzin iste
                Notification.requestPermission().then(permission => {
                    if (permission === "granted") {
                        new Notification("Harika!", { body: "Bildirim izinleri başarıyla verildi." });
                    }
                });
            } else {
                alert("Bildirimler engellenmiş. Lütfen adres çubuğundaki kilit simgesinden izin ver.");
            }
        });
});
</script>

</body>
</html>
